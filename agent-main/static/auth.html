<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 下一站Youth</title>
    <link rel="stylesheet" href="/static/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- 背景装饰 -->
        <div class="bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>

        <!-- 主卡片 -->
        <div class="auth-card">
            <!-- Logo 和标题 -->
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-plane-departure"></i>
                </div>
                <h1>下一站Youth</h1>
                <p class="subtitle">开启您的智能旅行规划之旅</p>
            </div>

            <!-- 登录表单 -->
            <div id="loginForm" class="auth-form active">
                <h2><i class="fas fa-sign-in-alt"></i> 用户登录</h2>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginUsername">
                            <i class="fas fa-user"></i> 用户名或邮箱
                        </label>
                        <input
                            type="text"
                            id="loginUsername"
                            name="username"
                            placeholder="请输入用户名或邮箱"
                            required
                            autocomplete="username"
                        >
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">
                            <i class="fas fa-lock"></i> 密码
                        </label>
                        <div class="password-input">
                            <input
                                type="password"
                                id="loginPassword"
                                name="password"
                                placeholder="请输入密码"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-link" onclick="openResetPasswordModal(); return false;">忘记密码？</a>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>

                    <div class="form-footer">
                        <span>还没有账号？</span>
                        <a href="#" onclick="showRegisterForm()">立即注册</a>
                    </div>

                    <div class="divider">
                        <span>或</span>
                    </div>

                    <button type="button" class="btn btn-secondary" onclick="enterAsGuest()">
                        <i class="fas fa-user-secret"></i> 游客模式
                    </button>
                </form>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="auth-form">
                <h2><i class="fas fa-user-plus"></i> 用户注册</h2>
                <form id="registerFormElement">
                    <div class="form-group">
                        <label for="regUsername">
                            <i class="fas fa-user"></i> 用户名
                        </label>
                        <input
                            type="text"
                            id="regUsername"
                            name="username"
                            placeholder="3-20个字符，字母数字下划线或连字符"
                            pattern="[a-zA-Z0-9_-]{3,20}"
                            required
                            autocomplete="username"
                        >
                        <small class="help-text">用于登录，注册后不可修改</small>
                    </div>

                    <div class="form-group">
                        <label for="regEmail">
                            <i class="fas fa-envelope"></i> 邮箱（可选）
                        </label>
                        <input
                            type="email"
                            id="regEmail"
                            name="email"
                            placeholder="example@email.com"
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="regNickname">
                            <i class="fas fa-id-card"></i> 昵称
                        </label>
                        <input
                            type="text"
                            id="regNickname"
                            name="nickname"
                            placeholder="显示的名称"
                            autocomplete="nickname"
                        >
                    </div>

                    <div class="form-group">
                        <label for="regPassword">
                            <i class="fas fa-lock"></i> 密码
                        </label>
                        <div class="password-input">
                            <input
                                type="password"
                                id="regPassword"
                                name="password"
                                placeholder="至少6个字符"
                                minlength="6"
                                required
                                autocomplete="new-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <!-- 密码强度指示器 -->
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span class="strength-text" id="strengthText">密码强度</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regPasswordConfirm">
                            <i class="fas fa-lock"></i> 确认密码
                        </label>
                        <div class="password-input">
                            <input
                                type="password"
                                id="regPasswordConfirm"
                                name="passwordConfirm"
                                placeholder="再次输入密码"
                                minlength="6"
                                required
                                autocomplete="new-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('regPasswordConfirm')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeTerms" required>
                            <span>我已阅读并同意 <a href="#" onclick="showTerms()">《用户协议》</a> 和 <a href="#" onclick="showPrivacy()">《隐私政策》</a></span>
                        </label>
                    </div>

                    <!-- 注册错误提示 -->
                    <div id="registerErrorAlert" class="error-alert" style="display: none;">
                        <div class="error-icon">
                            <i class="fas fa-exclamation-circle"></i>
                        </div>
                        <div class="error-content">
                            <h4>注册失败</h4>
                            <p id="registerErrorMessage"></p>
                            <div id="registerErrorExamples" class="error-examples"></div>
                        </div>
                        <button class="error-close" onclick="hideRegisterError()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus"></i> 注册
                    </button>

                    <div class="form-footer">
                        <span>已有账号？</span>
                        <a href="#" onclick="showLoginForm()">立即登录</a>
                    </div>
                </form>
            </div>

            <!-- 加载遮罩 -->
            <div id="loadingOverlay" class="loading-overlay">
                <div class="spinner"></div>
                <p id="loadingText">处理中...</p>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="auth-footer">
            <p>&copy; 2026 下一站Youth. All rights reserved.</p>
        </div>
    </div>

    <!-- 重置密码弹窗 -->
    <div id="resetPasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-key"></i> 重置密码</h2>
                <button class="close-btn" onclick="closeResetPasswordModal()">&times;</button>
            </div>
            <form id="resetPasswordForm" onsubmit="handleResetPassword(event)">
                <div class="form-group">
                    <label for="resetIdentifier">
                        <i class="fas fa-user"></i> 用户名或邮箱
                    </label>
                    <input
                        type="text"
                        id="resetIdentifier"
                        name="identifier"
                        placeholder="请输入用户名或邮箱"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="resetNewPassword">
                        <i class="fas fa-lock"></i> 新密码
                    </label>
                    <input
                        type="password"
                        id="resetNewPassword"
                        name="new_password"
                        placeholder="请输入新密码（至少6位）"
                        minlength="6"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="resetConfirmPassword">
                        <i class="fas fa-lock"></i> 确认新密码
                    </label>
                    <input
                        type="password"
                        id="resetConfirmPassword"
                        name="confirm_password"
                        placeholder="请再次输入新密码"
                        minlength="6"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-check"></i> 确认重置
                </button>
            </form>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast" class="toast">
        <div class="toast-icon">
            <i class="fas fa-check-circle" id="toastIcon"></i>
        </div>
        <div class="toast-content">
            <p class="toast-title" id="toastTitle">成功</p>
            <p class="toast-message" id="toastMessage">操作成功</p>
        </div>
        <button class="toast-close" onclick="hideToast()">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
